<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Director</title>
  <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
  <div id="root"></div>
  <div id="js-error" style="color:red;padding:20px;display:none;white-space:pre-wrap;font-family:monospace"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('js-error');
      el.style.display = 'block';
      el.textContent = 'ERROR: ' + msg + '\n' + url + ':' + line + ':' + col;
      if (err && err.stack) el.textContent += '\n' + err.stack;
    };
    window.onunhandledrejection = function(e) {
      var el = document.getElementById('js-error');
      el.style.display = 'block';
      el.textContent = 'UNHANDLED: ' + (e.reason && e.reason.stack || e.reason);
    };
  </script>
  <script type="module" src="/frontend/bundle.js"></script>
</body>
</html>
