<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movie Director</title>
  <link rel="stylesheet" href="/frontend/bundle.css">
</head>
<body>
  <div id="root"></div>
  <div id="js-error" style="color:red;padding:20px;display:none;white-space:pre-wrap;font-family:monospace"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('js-error');
      el.style.display = 'block';
      el.textContent = 'ERROR: ' + msg + '\n' + url + ':' + line + ':' + col;
      if (err && err.stack) el.textContent += '\n' + err.stack;
    };
    window.onunhandledrejection = function(e) {
      var el = document.getElementById('js-error');
      el.style.display = 'block';
      el.textContent = 'UNHANDLED: ' + (e.reason && e.reason.stack || e.reason);
    };
  </script>
  <script type="module" src="/frontend/bundle.js"></script>
  <script>
    // Dev HMR: auto-reload when bundle is rebuilt by the file watcher
    (function() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var ws = new WebSocket(proto + '//' + location.host + '/ws');
      ws.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          if (msg.type === 'hmr-reload') location.reload();
        } catch {}
      };
    })();
  </script>
</body>
</html>
